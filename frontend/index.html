<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CloudVault">
  <meta name="description" content="Your personal cloud storage">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <title>CloudVault</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/mobile.css">
  <link rel="stylesheet" href="styles/auth.css">
  <link rel="stylesheet" href="styles/modals.css">
  <link rel="stylesheet" href="styles/players.css">
</head>
<body>
  <div id="splash-screen">
    <div class="splash-content">
      <img src="https://i.ibb.co/rTy9bHY/image.webp" alt="Logo" width="96" height="96" style="border-radius:24px">
      <h1>CloudVault</h1>
    </div>
  </div>

  <div id="app">
    <!-- Auth Page -->
    <div id="auth-page" class="page active">
      <div class="auth-container">
        <div class="auth-card glass-card">
          <div class="auth-logo">
            <img src="https://i.ibb.co/rTy9bHY/image.webp" alt="Logo" width="80" height="80" style="border-radius:20px;margin-bottom:14px">
            <h1>CloudVault</h1>
            <p>Your personal cloud storage</p>
          </div>

          <!-- Login Form -->
          <form id="login-form" class="auth-form active">
            <div class="form-group">
              <label>Email</label>
              <div class="input-wrapper">
                <input type="email" id="login-email" placeholder="Enter your email" required autocomplete="email">
              </div>
            </div>
            <div class="form-group">
              <label>Password</label>
              <div class="input-wrapper">
                <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full"><span>Sign In</span></button>
            <p class="auth-switch">Don't have an account? <a href="#" onclick="showRegister(event)">Create one</a></p>
          </form>

          <!-- Register Form -->
          <form id="register-form" class="auth-form">
            <div class="form-group">
              <label>Email</label>
              <div class="input-wrapper">
                <input type="email" id="register-email" placeholder="Enter your email" required autocomplete="email">
              </div>
            </div>
            <div class="form-group">
              <label>Password</label>
              <div class="input-wrapper">
                <input type="password" id="register-password" placeholder="Create a password" required minlength="6">
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full"><span>Create Account</span></button>
            <p class="auth-switch">Already have an account? <a href="#" onclick="showLogin(event)">Sign in</a></p>
          </form>
        </div>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="page">
      <div id="main-files">
        <div id="files-header">
          <div class="files-top">
            <h1>My Files</h1>
            <button class="btn btn-secondary" id="logout-btn" onclick="logout()">Sign Out</button>
          </div>
          <div id="files-count"></div>
        </div>
        <div id="files-container" class="files-container grid-view"></div>
        <div id="files-loading" class="loading-spinner" style="display:none"><div class="spinner"></div></div>
        <div id="files-empty" class="empty-state" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          <h3>No files yet</h3>
          <p>Tap the upload button below to add files</p>
        </div>
      </div>

      <!-- Upload Button -->
      <button id="upload-fab" onclick="openUploadModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Upload</span>
      </button>
    </div>
  </div>

  <!-- Upload Progress Overlay -->
  <div id="upload-overlay" class="upload-overlay" style="display:none">
    <div class="upload-sheet">
      <div class="upload-sheet-header">
        <h2>Uploading...</h2>
        <span id="upload-progress-text">0%</span>
      </div>
      <div class="upload-sheet-bar">
        <div class="upload-sheet-fill" id="upload-sheet-fill" style="width:0%"></div>
      </div>
      <div class="upload-sheet-list" id="upload-sheet-list"></div>
    </div>
  </div>

  <!-- Image Viewer -->
  <div id="image-viewer" class="image-viewer" style="display:none">
    <div class="viewer-header">
      <span id="viewer-filename"></span>
      <div class="viewer-actions">
        <button onclick="rotateImage(-90)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg></button>
        <button onclick="rotateImage(90)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg></button>
        <button onclick="zoomImage(-0.1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
        <button onclick="zoomImage(0.1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
        <button onclick="closeImageViewer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </div>
    </div>
    <div class="viewer-content"><img id="viewer-image" src="" alt=""></div>
  </div>

  <!-- Video Player -->
  <div id="video-player" class="media-player" style="display:none">
    <div class="player-header">
      <span id="video-filename"></span>
      <button onclick="closeVideoPlayer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="player-body"><video id="video-element" controls></video></div>
  </div>

  <!-- Audio Player -->
  <div id="audio-player" class="media-player audio-player-modal" style="display:none">
    <div class="player-header">
      <span id="audio-filename"></span>
      <button onclick="closeAudioPlayer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="player-body"><audio id="audio-element" controls></audio></div>
  </div>

  <!-- Text Viewer -->
  <div id="text-viewer" class="media-player" style="display:none">
    <div class="player-header">
      <span id="text-filename"></span>
      <button onclick="closeTextViewer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="player-body"><pre id="text-content"></pre></div>
  </div>

  <!-- PDF Viewer -->
  <div id="pdf-viewer" class="media-player" style="display:none">
    <div class="player-header">
      <span id="pdf-filename"></span>
      <button onclick="closePdfViewer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="player-body"><iframe id="pdf-iframe" src="" frameborder="0"></iframe></div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="config.js"></script>
  <script>setTimeout(()=>{const s=document.getElementById('splash-screen');if(s)s.remove()},2000);</script>
  <script src="scripts/api.js"></script>
  <script src="scripts/auth.js"></script>
  <script src="scripts/app.js"></script>
  <script src="scripts/files.js"></script>
  <script src="scripts/upload.js"></script>
  <script src="scripts/viewers.js"></script>
  <script src="scripts/ui.js"></script>
</body>
</html>
