<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VAKKI PRIVET">
  <meta name="description" content="Your personal cloud storage">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <title>VAKKI PRIVET</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/auth.css">
  <link rel="stylesheet" href="styles/players.css">
</head>
<body>
  <div id="splash-screen">
    <div class="splash-content">
      <img src="https://i.ibb.co/rTy9bHY/image.webp" alt="Logo" width="96" height="96" style="border-radius:24px">
      <h1>VAKKI PRIVET</h1>
    </div>
  </div>

  <div id="app">
    <!-- Auth Page -->
    <div id="auth-page" class="page active">
      <div class="auth-container">
        <div class="auth-card glass-card">
          <div class="auth-logo">
            <img src="https://i.ibb.co/rTy9bHY/image.webp" alt="Logo" width="80" height="80" style="border-radius:20px;margin-bottom:14px">
            <h1>VAKKI PRIVET</h1>
            <p>Your personal cloud storage</p>
          </div>

          <form id="login-form" class="auth-form active">
            <div class="form-group">
              <label>Email</label>
              <div class="input-wrapper">
                <input type="email" id="login-email" placeholder="Enter your email" required autocomplete="email">
              </div>
            </div>
            <div class="form-group">
              <label>Password</label>
              <div class="input-wrapper">
                <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full"><span>Sign In</span></button>
            <p class="auth-switch">Don't have an account? <a href="#" onclick="showRegister(event)">Create one</a></p>
          </form>

          <form id="register-form" class="auth-form">
            <div class="form-group">
              <label>Email</label>
              <div class="input-wrapper">
                <input type="email" id="register-email" placeholder="Enter your email" required autocomplete="email">
              </div>
            </div>
            <div class="form-group">
              <label>Password</label>
              <div class="input-wrapper">
                <input type="password" id="register-password" placeholder="Create a password" required minlength="6">
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full"><span>Create Account</span></button>
            <p class="auth-switch">Already have an account? <a href="#" onclick="showLogin(event)">Sign in</a></p>
          </form>
        </div>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="page">
      <!-- Header -->
      <header id="app-header">
        <div class="header-left">
          <img src="https://i.ibb.co/rTy9bHY/image.webp" alt="" width="28" height="28" style="border-radius:8px">
          <span class="header-title">VAKKI PRIVET</span>
        </div>
        <button id="logout-btn" onclick="logout()" title="Sign Out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </header>

      <!-- Files -->
      <div id="main-files">
        <div id="files-container" class="files-grid"></div>
        <div id="files-loading" class="loading-wrap" style="display:none"><div class="spinner"></div></div>
        <div id="files-empty" class="empty-state" style="display:none">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          </div>
          <h3>No files yet</h3>
          <p>Tap Upload to add your first file</p>
        </div>
      </div>

      <!-- Upload Button -->
      <button id="upload-btn" onclick="openUploadModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Upload Files</span>
      </button>
    </div>
  </div>

  <!-- Upload Sheet -->
  <div id="upload-sheet-overlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
    <div class="upload-sheet">
      <div class="upload-sheet-header">
        <h2>Uploading</h2>
        <span class="upload-pct" id="upload-pct">0%</span>
      </div>
      <div class="upload-track">
        <div class="upload-track-fill" id="upload-track-fill" style="width:0%"></div>
      </div>
      <div class="upload-sheet-body" id="upload-sheet-body"></div>
    </div>
  </div>

  <!-- Image Viewer -->
  <div id="image-viewer" class="viewer-overlay" style="display:none">
    <div class="viewer-header">
      <span id="viewer-filename"></span>
      <div class="viewer-actions">
        <button onclick="rotateImage(-90)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg></button>
        <button onclick="rotateImage(90)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg></button>
        <button onclick="closeImageViewer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </div>
    </div>
    <div class="viewer-body"><img id="viewer-image" src="" alt=""></div>
  </div>

  <!-- Video Player -->
  <div id="video-player" class="viewer-overlay" style="display:none">
    <div class="viewer-header">
      <span id="video-filename"></span>
      <button onclick="closeVideoPlayer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="viewer-body"><video id="video-element" controls></video></div>
  </div>

  <!-- Audio Player -->
  <div id="audio-player" class="viewer-overlay" style="display:none">
    <div class="viewer-header">
      <span id="audio-filename"></span>
      <button onclick="closeAudioPlayer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="viewer-body audio-viewer-body">
      <div class="audio-art">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <audio id="audio-element" controls></audio>
    </div>
  </div>

  <!-- Text Viewer -->
  <div id="text-viewer" class="viewer-overlay" style="display:none">
    <div class="viewer-header">
      <span id="text-filename"></span>
      <button onclick="closeTextViewer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="viewer-body"><pre id="text-content"></pre></div>
  </div>

  <!-- PDF Viewer -->
  <div id="pdf-viewer" class="viewer-overlay" style="display:none">
    <div class="viewer-header">
      <span id="pdf-filename"></span>
      <button onclick="closePdfViewer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="viewer-body"><iframe id="pdf-iframe" src="" frameborder="0"></iframe></div>
  </div>

  <div id="toast-container"></div>

  <script src="config.js"></script>
  <script>setTimeout(()=>{const s=document.getElementById('splash-screen');if(s)s.remove()},2000);</script>
  <script src="scripts/api.js"></script>
  <script src="scripts/auth.js"></script>
  <script src="scripts/app.js"></script>
  <script src="scripts/files.js"></script>
  <script src="scripts/upload.js"></script>
  <script src="scripts/viewers.js"></script>
  <script src="scripts/ui.js"></script>
</body>
</html>
